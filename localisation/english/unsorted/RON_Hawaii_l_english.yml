l_english:

### ideas ###

HAW_restore_monarchy:0 "Restore The Monarchy"
HAW_restore_monarchy_desc:0 "It is time to restore the Monarchy and bring back our Queen."

HAW_david_I:0 "Liliuokalani I"
HAW_david_I_desc:0 "Queen of Hawaii and protector of the people and protector of the Gods."

HAW_kingdom:0 "Kingdom Of Hawaii"

HAW_kingdom_restored:0 "Restore The Kingdom."
HAW_kingdom_restored_desc:0 "It is time to restore the kingdom and remove the shame of being illegally annexed by the United States."

HAW_royal_guard:0 "Royal Guard"
HAW_royal_guard_desc:0 "Protectors of the Monarch and the Temples."

HAW_restore_royal_guard:0 "Create The Royal Guard"
HAW_restore_royal_guard_desc:0 "To prevent another illegal coup the monarch needs a royal guard to protect them and the temples."

HAW_invite_japanese:0 "Invite Japanese Settlers"
HAW_invite_japanese_desc:0 "Hawaii already has a population of Japanese settlers on the islands. With Japan in ruins we can invite more to come to Hawaii"

HAW_japanese_minority:0 "Japanese Minority"
HAW_japanese_minority_desc:0 "Japanese Settlers in Hawaii have some political power and influence in the nation"

HAW_new_islands:0 "New Islands"
HAW_new_islands_desc:0 "We need to expand to other islands in order to increase the size of our economy and our military."

HAW_new_settlers:0 "New Settlers For New Islands"
HAW_new_settlers_desc:0 "We need to invite Settlers to come to our new lands and help us build up our country."

HAW_nation_unity:0 "National Unity"
HAW_nation_unity_desc:0 "Unite Fellow Hawaiians! Long Live The Queen!"

HAW_new_soldiers:0 "New Divisions"
HAW_new_soldiers_desc:0 "The Veterans from multiple wars are ready to join the army once again to defend our Kingdom."

HAW_new_schools:0 "Reformed Schools"
HAW_new_schools_desc:0 "The Education System has been modernized and reformed for our students."

HAW_education_reforms:0 "Education Reforms"
HAW_education_reforms_desc:0 "The Education System is outdated and needs to be reformed and modernized to educate our students better."

HAW_new_farms:0 "Reformed Farming"
HAW_new_farms_desc:0 "Government reforms have helped the farmers use better equipment and farming skills."

HAW_land_reforms:0 "Land Reforms"
HAW_land_reforms_desc:0 "The farmers need out help and we are happy to help them with anything they need"

HAW_first_war:0 "the First War"
HAW_first_war_desc:0 "It is time to start taking our new lands and expanding our kingdom. the western powers are must be defeated"

HAW_king_speech:0 "The Queen's Speech"

HAW_princess:0 "Princess Liliuokalani"
HAW_princess_desc:0 "Daughter of Queen Liliuokalani and Heir to the Hawaiian Throne. Future protector of the kingdom and the temples."

HAW_the_new_princess:0 "The New Princess"
HAW_the_new_princess_desc:0 "The Gods have blessed the king with a healthy baby girl! Heir to the throne!"
 
HAW_build_up:0 "Building Up The Kingdom"
HAW_build_up_desc:0 "It is time that we build up the kingdom in order to improve our economy and help us in times of war."

HAW_next_war:0 "Our Next Target."
HAW_next_war_desc:0 "With France defeated and our claim now ours it is time to move on to our next target. Britian."

HAW_american_war:0 "The American War"
HAW_american_war_desc:0 "Our next target is the United States. They will now pay for illegally annexing us and repressing our culture and religion." 

HAW_conservative_ban:0 "Extremist Parties Banned"

HAW_ban_extremeist_parties:0 "Outlaw Extremist Parties"
HAW_ban_extremeist_parties_desc:0 "In order to protect our nation and our monarchy we must ban extremist parties."

HAW_police_force:0 "Royal Hawaiian Police Force"
HAW_police_force_desc:0 "Enforcers of the law and protectors of the people."

HAW_royal_police:0 "Create A Police Force"
HAW_royal_police_desc:0 "The Kingdom needs a police force in order to protect our people and to enforce the law."

HAW_diplomatic_visits:0 "Diplomatic Visits"
HAW_diplomatic_visits_desc:0 "We need to make friends with other nations and to create trade agreements with other nations."

HAW_destroy_mao:0 "Destroy Mao"
HAW_destroy_mao_desc:0 "Mao is a monster and has killed millions of people. It is time to liberate China and bring democracy back to it."

HAW_temple:0 "Rebuild The Temples"
HAW_temple_desc:0 "It is time to rebuild the temples and our relationships with the gods."

HAW_restored_temples:0 "Temple Of The Gods"

HAW_the_navy_reforms:0 "The Navy Reforms"
HAW_the_navy_reforms_desc:0 "More Ships, More Sailors, More Strength!

HAW_Royal_Navy:0 "The Royal Navy"
HAW_Royal_Navy_desc:0 "Hawaii needs a navy in order to protect our islands and to transport our troops overseas."

HAW_army_reforms:0 "Army Reforms"
HAW_army_reforms_desc:0 "Better Training Better Equipment and Better Soldiers."

HAW_Royal_Army:0 "Royal Army Reforms"
HAW_Royal_Army_desc:0 "The army needs reforms in order to improve our soldiers and equipment."

HAW_empire_building:0 "Building An Empire"
HAW_empire_building_desc:0 "It is time to start building an empire of our own. This will help us gain respect along the world nations."

HAW_even_more_islands:0 "Second Island Grab"
HAW_even_more_islands_desc:0 "It is time to expand again and take more islands."