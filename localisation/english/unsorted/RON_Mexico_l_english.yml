 ## ELECTION UPDATE ##
 #####################
 
 mexico_1940.1.t: "PRI Candidate"
 mexico_1940.1.d: "The election is drawing closer, and we must put forward a candidate to campaign for the PRI against the right wing. Currently, there are two possible candidates. Fransisco Mugica is left wing, and more aligned with socialist ideals. Choosing Mugica would be a risk if popularity for socialist ideals are low. Manuel Ávila Camacho is the more centrist choice, and is more accepted by the right wing. However, choosing Camacho would stop any hope of left wing reforms passing."
 mexico_1940.1.a: "Choose Fransisco Mugica to run for president. (Communist choice)"
 mexico_1940.1.b: "Choose Manuel Ávila Camacho to run for president. (Neutral choice)"
 
 mexico_1940.2.t: "Right Wing Candidate"
 mexico_1940.2.d: "The right wing is currently in a civil war between Juan Andreu Almazán and Joaquin Amaro over who should be the presidential candidate. Almazán is known more for being a noted businessman rather than a military figure, and draws in support mainly from wealthy Mexicans. However, his support among the working poor is abysmal as he is seen as offering nothing to them. Almazán's foreign policy is noticeably pro-US and further alianates average Mexicans. Amaro however is a famous military figure, and draws respect from the nationalists. Despite this, Almazán is seen as the inevitable choice for the right wing candidacy and Amaro's bid is quickly losing support to Almazán's campaign through a series of high profile defections. It is clear that Amaro will inevitably lose as Juan is backed by US interests and people find voting for a candidate that the US would try to overthrow is a fool's errand. However, there are people among the fascist cabal in Mexican politics who want to ensure that Almazán never lives to see election day. Maximino Ávila Camacho, brother to Manuel Ávila Camacho, has devised a plan to assassinate Juan Almazán at Plueba by staging an train accident."
 mexico_1940.2.a: "Juan Almazán runs for president. (Democratic choice)"
 mexico_1940.2.b: "Juan Almazán dies, Amaro runs for president. (Fascist choice)"
 
 mexico_1940.3.t: "MEXICAN PRESIDENTIAL CANDIDATE KILLED!"
 mexico_1940.3.d: "Juan Almazán, the front runner to become the right wing presidential candidate has died in a train derailment in Plueba killing all those aboard. Almazán, a controversial figure, is no stranger to assassination attempts and has had multiple attempts on his life during the presidential campaign. His supporters have accused the PRI itself of orchestrating the derailment. Previously, Almazán was attacked by assassins wearing sarapes that hid machine guns while staying at the house of Fransisco Barbosa. His campaign claims he was attacked by an army of 100 assassins, and that he had to be stopped from running outside to fight them. Former general Alfredo Serratos however stated in an interview there were only 5 assassins."
 mexico_1940.3.a: "Horrific."
 
 mexico_1940.4.t: "Mexican election"
 mexico_1940.4.d: "The Election has arrived, and the election is won by..."
 mexico_1940.4.a: "Fransisco Mugica (Communist choice)"
 mexico_1940.4.b: "Manuel Ávila Camacho (Neutral choice)"
 mexico_1940.4.c: "Juan Almazán (Democratic choice)"
 mexico_1940.4.e: "Joaquin Amaro (Fascist Choice)"
