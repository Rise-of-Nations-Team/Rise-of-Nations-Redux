 ##########
 ##PEOPLE## - MASSIVE UPDATES FROM JUNTA UPDATE
 ##########
 
 # ARMY FIGURES
 
 Joaquin_Amaro: "Joaquín Amaro Domínguez"
 Joaquin_Amaro_desc: "Known as "El Indio" Amaro is best known for his complete overhaul of the Mexican military following the revolution. His policies rebuilt the shattered army, and brought many organizational innovations to the Mexican military structure. His reforms were even covered by American newspapers, who marveled at how a single indian could rebuild an entire army. "
 
 Andres_Figueroa: "Andrés Figueroa"
 Andres_Figueroa_desc: "Secretary of the army, Andres Figeroa was the secretary appointed by Cardenas to purge the military of potential traitors and enact Cardenista reforms. In real life, Andres Figeroa died a few months after he accepts this position in 1936 of unknown causes."
 
 MEX_pablo_m_valenzuela: "Pablo Macías Valenzuela"
 MEX_pablo_m_valenzuela_desc: "Valenzuela's responsibility during his term as defense secretary was the defense of Mexico, particularly its shores, from any surprise attack."
 
 enrique_estrada2: "Enrique Estrada"
 enrique_estrada_desc2: "Enrique Estrada was a student under the famous revolutionary General Felipe Angeles, where Enrique was taught the art of artillery."
 
 MEX_Escobar: "José Gonzalo Escobar"
 MEX_Escobar_desc: "José Gonzalo Escobar was the leader of the Escobar rebellion to oust Callistas from power. His rebellion had initial success with ground forces, but the lack of support from the airforce sealed the fate of his coup."
 
 matias: "Matías Ramos Santos"
 
 urquizo: "Fransisco L. Urquizo"
 urquizo_desc: "Fransisco L. Urquizo jumped from position position throughout his political career, but the most prominent in his political career in this era was being the head of war industry."
 
 manuel: "Manuel Ávila Camacho"
 manuel_desc: "Manuel Avila Camacho was the secretary of defense between 1936-1939, where he resigned to run for president the next year."
 
 jesus: "Jesús Agustín Castro Rivera"
 
 cardenas: "Lazaro Cardenas"
 cardenas_desc: "Cardenas, after his term, had become a controversial figure due to a shift to the right in Mexican politics slandered him as a communist puppet. However, his status as a hero of the revolution inspired confidence in both Mexicans and the military."
 
 MEX_candido_aguilar: "Candido Aguilar"
 MEX_candido_aguilar_desc: "Candido Aguilar was a Mexican officer famous for exposing political corruption and fleeing the country. He returned shortly after Plutarco Elias Calles was exiled, and served as an advisor."
 
 # Air Figures
 
 Luis_F_Cubillas: "Luis Farell Cubillas"
 Luis_F_Cubillas_desc: "Cubillas is the most revered Mexican aviation idol, and one of the last few surviving idols. He flew sorties in every conflict in Mexico since the Mexican Revolution, and his many decorations make him a symbol of pride in Mexico."
 Luis_F_Cubillas2: "Luis Farell Cubillas"
 Luis_F_Cubillas_desc2: "Cubillas is the most revered Mexican aviation idol, and one of the last few surviving idols. He flew sorties in every conflict in Mexico since the Mexican Revolution, and his many decorations make him a symbol of pride in Mexico."
 
 MEX_Alfonso_Cruz_Rivera: "Alfonso Rivera"
 Alfonso_C_Rivera: "Alfonso Rivera"
 Alfonso_C_Rivera_desc: "Alfonso Cruz Rivera is one of the last remaining Mexican air idols. During Mexico's involvement in the Spanish Civil War, he was responsible for flying in supplies during the night. In the 1950s during the Mexican-Guatemalan war, he was responsible for planning an aerial attack that would've wiped Guatemala's airforce, if it had not been called off at the last second due to political negotiations."
 Alfonso_C_Rivera2: "Alfonso Rivera"
 Alfonso_C_Rivera2_desc: "Alfonso Cruz Rivera is one of the last remaining Mexican air idols. During Mexico's involvement in the Spanish Civil War, he was responsible for flying in supplies during the night. In the 1950s during the Mexican-Guatemalan war, he was responsible for planning an aerial attack that would've wiped Guatemala's airforce, if it had not been called off at the last second due to political negotiations."
 
 Juan_Azcarate: "Juan Azcárate"
 Juan_Azcarate_desc: "Juan Azcárate was a highly decorated aviation engineer during the Maximato era, and was one of Mexico's aviation legends. He was a director of the TNCA before its shut down during the Maximato. He blamed the closure in his autobiography on political suppression."
 
 MEX_Alfonso_Tabon: "Alfonso Tabon"
 MEX_Alfonso_Tabon_desc: "Alfonso Tabon was the army officer appointed to explore ways of modernizing the Mexican airforce. In real life, his attempts were futile as the paranoia leading up to WWII meant other countries were histant to license planes, and technology. The dismantling of the Mexican aviation programs during the Maximato led to a serious brain drain on native designs."

 MEX_Juan: "Juan Villasana"
 MEX_Juan_desc: "Juan Villasana is another highly decorated aviation pioneer. He invented the Anáhuac Helix, and his invention was exported to other Latin American countries, and Japan. The Imperial Japanese air corps gave him commendation for his invention, and he is noted as the founder of Mexican aviation. He was also one of the first people to create a helicopter, dubbed the "Villasana Helicopter.""
 
 MEX_Gustavo_L_Gonzalez: "Gustavo L. Gonzalez"
 
 Salinas: "Gustavo Adolfo Salinas Camiña"
 Salinas2: "Gustavo Adolfo Salinas Camiña"
 Salinas3: "Gustavo Adolfo Salinas Camiña"
 Salinas_desc: "The first airman to perform a naval strike. In 1943 he was quoted as saying "The bombs I used were home-made, with a charge of 52 sticks of dynamite. Primitive as they were, they worked like a charm. At the time I was flying an old Wright pusher type. It occurred to me that the day would come when we would have planes of weight-carrying efficiency beyond one's fondest hopes, and that then the plane would come into its own as a military assault weapon of fabulous power. That day has come." "
 Salinas2_desc: "The first airman to perform a naval strike. In 1943 he was quoted as saying "The bombs I used were home-made, with a charge of 52 sticks of dynamite. Primitive as they were, they worked like a charm. At the time I was flying an old Wright pusher type. It occurred to me that the day would come when we would have planes of weight-carrying efficiency beyond one's fondest hopes, and that then the plane would come into its own as a military assault weapon of fabulous power. That day has come." "
 Salinas3_desc: "The first airman to perform a naval strike. In 1943 he was quoted as saying "The bombs I used were home-made, with a charge of 52 sticks of dynamite. Primitive as they were, they worked like a charm. At the time I was flying an old Wright pusher type. It occurred to me that the day would come when we would have planes of weight-carrying efficiency beyond one's fondest hopes, and that then the plane would come into its own as a military assault weapon of fabulous power. That day has come." "

 agustin_olachea2: "Agustin Aviles Olachea"
 agustin_olachea2_desc: "Agustin Aviles Olachea built air colleges during WWII, and helped formalize the Mexican airforce for later generations as the era of self taught revolutionary air idols came to a close."
 
 antonio: "Antonio Cardenas Rodriguez"
 antonio_desc: "Antonio's defining moment over his military career was leading Squadron 201 over the Phillipines in the closing stages of the second world war."
 
 #POLITICAL FIGURES
 
 Miguel_Comacho: "Miguel Ávila Camacho"
 Miguel_Comach_desc: "Miguel Ávila Camacho was the replacement secretary of army after Andres Figeroa. He was noted as having finally professionalized the Mexican army by American observers, and rebuilt the shattered Mexican army into a small but disciplined force."
 
 Maximino: "Maximino Ávila Camacho"
 Maximino_desc: "Maximino is the brother to Manuel Avila Comacho. Maximino is noted for being not only an Axis Sympathizer, but also a business partner to William Jenkins who has a monopoly on Mexican media and thwarting Allied influence. Maximino's interference singlehandedly destroyed the propaganda attempts of France and Britain."
 
 Mugica: " Francisco José Múgica"
 Mugica_desc: "Múgica was one of the more well known generals during the time of the Mexican revolutions, and was intended to be picked by Cardenas to be his left wing successor instead of the more conservative Manuel Avila Comacho. Mugica's candidacy was not feasible, as by the end of Lazaro's term support for his political views collapsed."

 MEX_PAB: "Pablo Quiroga Trevino"
 MEX_PAB_desc: "Pablo Quiroga Trevino is noted as being one of Cardenas's closest allies. He is responsible for enforcing the controversial Socialist education, and crusading for Cardenas's politics. Pablo Quiroga was one of the few ministers of the original cabinet that was on the side of Cardenas."
 
 MEX_SANTA: "Miguel G. Santa Ana"
 MEX_SANTA_desc: "Miguel G. Santa Ana was responsible for the procurement of equipment, supplies, and other assets on behalf of S.E.D.E.N.A, Mexico's secretary of army and navy."
 
 Castillo: "Fransisco Castillo"
 Castillo_desc: "Castillo was best known for his position as ambassador to foreign countries, exploring possible trade deals and generally improving diplomatic relations."
 
 agustin_olachea: "Agustin Aviles Olachea"
 agustin_olachea_desc: "Agustin Olachea was responsible for the construction of anything deemed crucial to the function of the Mexican armed forces. He oversaw construction of many military projects ranging from new air bases to new war colleges throughout Mexico."
 
 MEX_plutarco_calles_desc: "Plutarco Calles, also known as "El Jefe Maximo", was the populist president from 1924-1928. Initially he was a man of the people with lots of public support, and a hero of the revolution. Unfortunately, like the dictator Porfiro Diaz the revolution fought against, he held onto power in Mexico until 1936 through puppet presidents and supporters in the PRM. His politics drifted to the right as time went on, and when his policies helped create the Cristero war his reputation had been entirely destroyed. This bad reputation culminated in 1936, with his exile to San Diego."
 
 padilla: "Ezequiel Padilla Peñaloza"
 padilla_desc: "During his time in government, padilla is most known for his staunch pro-US stance. Padilla was such a staunch supporter of US interest he periodically gave the US top secret Mexican documents."
 
 MEX_eduardo_saurez: "Eduardo Saurez"
 MEX_eduardo_saurez_desc: "Eduardo Saurez was Mexico's minister of finance from 1935 to 1946."
 
 MEX_rex_applegate: "Rex Applegate"
 MEX_rex_applegate_desc: "Rex Applegate was a US officer, and Roosevelt's personal bodyguard sent to train Mexican soldiers in special forces tactics, namely close quarters combat, and serving as advisor well after the war."
 
 MEX_Jose_Revueltas: "José Revueltas"
 MEX_Jose_Revueltas_desc: "José Revueltas was a controversial communist author. Kicked out of multiple communist parties for criticizing their political views openly, he is also known his association with union and farmer protestors during the late 1960s. It was his spread of protestor messages that culminated in the Tlatelolco Massacre of 1968."
 
 MEX_Maria: "María del Refugio García"
 MEX_Maria_desc: "María del Refugio García was a Mexican feminist icon, known for her marxist views. She is best known for her 11 day strike to reform discriminatory laws against women which drew the attention of president Lazaro Cardenas."
 # Navy
 Heriberto:0 "Heriberto Jara Corona"
 Heriberto_desc:0 "Heriberto is the very first secretary of navy of Mexico. Due to centralization of the military, the secretary of navy was created to dismantle the military's political power."
 
 hector: "Hector Meixueiro"
 
 # Theorists - JUNTA UPDATE, NEW STUFF HERE.
 
 gustavo: "Gustavo Adolfo Salinas Camiña"
 gustavo_desc: "The first airman to perform a naval strike. In 1943 he was quoted as saying "The bombs I used were home-made, with a charge of 52 sticks of dynamite. Primitive as they were, they worked like a charm. At the time I was flying an old Wright pusher type. It occurred to me that the day would come when we would have planes of weight-carrying efficiency beyond one's fondest hopes, and that then the plane would come into its own as a military assault weapon of fabulous power. That day has come." "
 
 matias2: "Matías Ramos"
 
 enrique_estrada: "Enrique Estrada"
 enrique_estrada_desc: "Enrique Estrada was a student under the famous revolutionary General Felipe Angeles, where Enrique was taught the art of artillery."
 
 MEX_Manuel_Sandoval_Vallarta: "Manuel Sandoval Vallarta"
 MEX_Manuel_Sandoval_Vallarta_desc: "Vallarta was a Mexican physicist who lectured at both MIT and UNAM. His field of experise was in cosmic rays. In 1927, he recieved a Gugeinheim Fellowship where he was hosted at the university of Berlin and Leipzig. While there, he learned from Einstein, Heiseinberg, Schrodinger, and Planck. In 1946, he chose to stay at UNAM full time to become an advisor for science policy. Vallarta is unique in that he mentored students in the US who would go on to complete the Manhattan Project. His pupils were Richard Feynman, and Julius Stratton. He also was a collegue to famous Belgian physcist Georges Lemaître during research on cosmic rays."
 
 
 #############
 ##COMPANIES##
 #############
 
 PEMEX: "PEMEX"
 PEMEX_desc: "PEMEX is the nationalized oil company of Mexico. Their creation started a massive wave of geological discoveries, social evolution, and economic innovations and was the main driving force behind Mexico's industrialization."
 
 aguila: "Aguila Oil"
 aguila_desc: "The Sinarquistas, Mexico's fascists, were ardent capitalists who believed in Mexican ownership of the Mexican market. If any foreign company wanted to enter the Mexican market they would need to do so through an independent Mexican intermediary. Under their leadership, the foreign oil industry would be forcefully naturalized and if PEMEX existed, it would have been auctioned off in pieces to Mexican elites."
 
 CEMEX: "CEMEX"
 
 Azcarate: "Azcarate S.A."
 Azcarate_desc: "Azcarate, after his political exile, formed a small aviation company where he built projects in partnership with Lockheed Martin during WWII."
 
 baja: "Mariscraft S.A."
 baja_desc: "Mariscraft was an obscure Mexican aviation company and only produced 1 plane in real life, the MA-260. The MA-260 was said to be a Mexican project to create a long range fighter-bomber, based on the concept of the 8W Zeus."
 
 Mendoza: "Productos Mendoza"
 Mendoza_desc: "Mendoza is the second legendary Mexican gun designer, behind Manuel Mondragon. They specialize in machine guns, ranging from HMGs to SMGs and full automatic rifles."
 
 Obregon: "Alejandro Obregón"
 Obregon_desc: "Obregón is best known for the Obregón .45 Pistol which innovated in simplifying the design of what looked like the 1911. Internally, it was vastly different and featured many simplified parts. This made the Obregón pistol more reliable and cheaper than the 1911. Obregón's are said to be hallmarks of craftsmanship."
 
 TGA2: "TGA"
 TGA2_desc: "The TNCA, now branded TGA, did not just make planes. They developed tanks that focused on heavy armor, and large caliber barrels. However, both the aviation and tank divisions were shut down during the Maximato."
 
 Grupo_Ramirez: "Grupo Ramirez"
 Grupo_Ramirez_desc: "Mexico's first car company, and creator of the Rural Ramirez truck. They specialize in cheap reliable cars and engines."
 
 Grupo_Ramirez2: "Grupo Ramirez"
 Grupo_Ramirez2_desc: "Mexico's first car company, and creators of the Rural Ramirez truck. They specialize in cheap reliable cars and engines."
 
 VAM: "VAM"
 VAM_desc: "A government controlled car manufacturer, originally an American jeep subsidiary that was turned into its own company following a government buyout."
 
 VAM2: "VAM"
 VAM2_desc: "A government controlled car manufacturer, originally an American jeep subsidiary that was turned into its own company following a government buyout."
 
 TELMEX: "TELMEX"
 TELMEX_DESC: "Telmex is the Mexican telecomm monopoly. Before it was sold off to private interests, it was bought out by the Mexican government to renovate Mexico's communication networks."
 
 MEX_ASTIMAR: "ASTIMAR"
 MEX_ASTIMAR_desc: "ASTIMAR is the government directed ship builder. They specialized in gunboats, and coastal defense."
 
 AHMSA: "AHMSA"
 AHMSA_desc: "AHMSA is the largest iron and coal miner in Mexico, they are also the largest steel manufacturer. They specialize in machine parts, and steel parts for infrastructure such as bridges."
 
 league: "Mexican League of Radio Experiments"
 league_desc: "The Mexican League of Radio Experiments were a group of scientists, some of them child prodigies, that innovated in the field of radio communications. They're best known for inventing the technology that allowed color television to exist."
 
 Echevarrieta: "Echevarrieta Shipyards"
 Echevarrieta_desc: "Echevarrieta was a Spanish shipyard company, who sold convoy escorts to Mexico."
 
 Odero: "Odero Shipyards"
 Odero_desc: "Odero Shipyards was an Italian shipyard company, who were responsible for building the more armored ships in Mexico's fleet."
 
 Angel: "Angel Lascurian"
 Angel_desc: "Angel Lascurian was a legendary aviator in Mexico, and made the most advanced and futuristic looking of any plane produced by Mexico. Aviation enthusiast magazines marveled how he designed and manufactured a natively designed, two engine single seater cargo aircraft using only a simplistic workbench. This aircraft was called the Aura, and was said by observers to be unnaturally agile for a plane of its size."
 
 electridad: "Comisión Federal de Electricidad"
 electridad_desc: "Comisión Federal de Electricidad is the state run energy company, also responsible for the development and construction of Mexico's nuclear energy plants."
 
 yokosuka_naval_arsenal2: "Yokosuka Naval Arsenal"
 
 #########
 ##IDEAS##
 #########
 
 curse: "The Curse of Huitzilopochtli"
 curse_desc: "The Mexican revolution, Cristero war, and Escobar rebellion have left Mexicans hesitant to trust the military, let alone join them. Enlightened thinkers say these tragedies, and all Mexican tragedies, were created by the Aztec god of war to take his bloody tribute that he once took from the Aztecs."
 
 jenkins: "Jenkins Blockade"
 jenkins_desc: "William O. Jenkins holds a monopoly of the Mexican media. His silent partner in this was Maximino Avila Comacho, who was an Axis Sympathizer. It was this alliance, dubbed the Jenkins Blockade by certain historians, that one of the big factors in the abysmal failure of the British-French attempt to take advantage of the isolationism in the United States foreign policy and goad Mexico into a European sphere of influence."
 
 allied: "Allied Propaganda"
 allied_desc: "France and Britain are trying to inject propaganda into Mexican media in an attempt to take advatange of America's isolationism to destabilize the American sphere of influence. Their efforts have been abysmal, and they are getting increasingly desperate enough to cause a diplomatic scene."
 
 porfirismo: "Porfirismo"
 porfirismo_desc: "The old wealth of Mexico are heavily Porfiristas, who benefited from Porfiro Diaz's dictatorship. They have been supporting Germany out of spite for the United Kingdom, and are actively thwarting the efforts of British and French propagandists. They are using their vast political presence to push Mexico into the arms of the Axis."
 
 porfirato: "Nuevo Porfirato"
 MEX_porfirato2: "Nuevo Porfirato"
 MEX_porfirato3: "Pact Politics"
 MEX_porfirato4: "Payaso Unions"
 MEX_porfirato5: "Mexican Feudalism"
 MEX_porfirato6: "Pacto De Honor"
 MEX_porfirato7: "Pacto De Honor"
 
 PAN: "Conservative Politics"
 MEX_PAN2: "Conservative Politics"
 MEX_PAN3: "La Camarilla"
 MEX_PAN4: "La Camarilla"
 MEX_PAN5: "La Camarilla"
 MEX_PAN6: "Perfect Dictatorship"
 MEX_PAN7: "Perfect Dictatorship"
 
 PRM: "PRM Politics"
 MEX_PRM2: "Nationalism"
 MEX_PRM3: "Reformatory Nationalism"
 MEX_PRM4: "Unionism"
 MEX_PRM5: "Statism"
 MEX_PRM6: "A New Mexico"
 MEX_PRM7: "A New Mexico"
 
 maximato: "Maximato"
 maximato_desc: "The Mexican government is permeated with loyalists to Plutarco Calles, also known as "El Jefe Maximo." He served as Mexican President from 1924-1928. Calles has been controlling Mexico through proxy presidents and supporters in the PRM. From 1924 to 1936, Calles was the one who held the true power in Mexico. This period in Mexican history is known as the Maximato."
 
 sexenio: "Plan Sexenio Militar"
 sexenio_desc: "Before WWII, Mexico devised a plan to rapidly modernize, rebuild, and professionalize the military. It involved motorization, mechanicanization, and equipment updates to the Army and by extension the air force. Unfortunately due to the rising fear of Hitler Mexico struggled to find any major power to license them modern equipment."
 
 sedena: "Secretaría de la Defensa Nacional"
 sedena: "With the military purged and Calles gone, you have now appointed a defense secretary that represent your politics, not Callista politics."
 
 MEX_DN-I: "DN-I"
 MEX_DN-I_desc: "DN-1 is one of three real world plans for the national security of Mexico. Its contents are revised every few years, and the contents of its modern iteration is unknown. It was only activated once, in Mexico's entry to WWII."
 
 MEX_DN-I2: "DN-I"
 MEX_DN-I2_desc: "DN-1 is one of three real world plans for the national security of Mexico. Its contents are revised every few years, and the contents of its modern iteration is unknown. It was only activated once, in Mexico's entry to WWII."
 
 MEX_DN-I3: "DN-I"
 MEX_DN-I3_desc: "DN-1 is one of three real world plans for the national security of Mexico. Its contents are revised every few years, and the contents of its modern iteration is unknown. It was only activated once, in Mexico's entry to WWII."
 
 MEX_DN-II: "DN-II"
 MEX_DN-II_desc: "DN-II is the second of the three main plans. DN-II is a real world plan for domestic threats to Mexico such as coups, revolutions, and terrorism. The third plan is for natural disasters."
 
 railroad: "Ferrocarriles Nacionales de México"
 railroad_desc: "The nationalized rail service was nationalized to force development of internal infrastructure based on need, not profitability."
 
 chemical: "Chemical Weapons Division"
 chemical_desc: "Mexico had considered chemical weapons in real life to defend against any invasion. It was voted down, as the political fallout would give people a reason to invade Mexico and embargo them. The exact opposite of what Mexico wanted as they intended to use trade to develop their economy further."
 
 # JUNTA UPDATE 
 
 cardenas2: "Lazaro Cardenas"
 cardenas2_desc: "Cardenas pushed the idea of mass mobilization during his term. He wanted working class Mexicans to rise up and aid the military in defending the country, arming and professionalizing the rural militias and militarizing the ejido lands."
 
 matias2: "Matias Ramos Santos"
 
 fierro: "Roberto Fierro"
 
 # tech update
 
 abelardo: "Abelardo Rodriguez"
 abelardo_desc: "Abelardo was a Mexican business tycoon, Mexican general, and interim Mexican president. He founded 80 companies, and had a hand in 120 in total. He founded Baja California, a Aviation military contractor, and Rodriguez Shipyards in Tijuana."
 
 rodriguez: "Rodriguez Shipyard"
 rodriguez_desc: "Owned by business Tycoon and former Mexican president Abelardo Rodriguez, Rodriguez Shipyard is situated in Tijuana. From what little information is left, they focused on smaller ships."
 
 #####################
 ## election update ##
 #####################
 
 MEX_almazan: "Juan Almazan"
 MEX_almazan_desc: "Juan was described as a businessman dressed as a general. His main business was in military construction, where his company was responsible for constructing the finest military base in Mexico in Monterrery in the 20s."
 
 Maximino2: "Maximino Avila Camacho"
 Maximino2_desc: "Maximino was the Caudillo of Puebla, where he owned the telegraphs, the railroads, the mains, and most infrastructure. During this time, Mexico had used its military's engineers to build infrastrcuture and other buildings quickly, with Maximino taking part. For this reason Maximino would be an expert at logistics, able to bring his expertise of supply lines and his experience in constructing infrastructure to any war."
 
 Maximino3: "Maximino Avila Camacho"
 Maximino3_desc: "Maximino was described by Mexican historians as arrogant, wrathful, and vindictive. Maximino was said to go after those who crossed him with extreme prejudice."
 
 MEX_MARC: "El Compa Nacho"
 MEX_MARC_desc: "El Compa Nacho, real name being Ignacio Morales, was an agent tied to both the Cardenista and Aleman groups and was said to be assigned to special assignments by them. Morales was accused by supporters of Almazan to be tied to a failed assassination plot on Alamazan's life. Source: "Political Intelligence and the Creation of Modern Mexico, 1938-1954", page 46."
 
 lopez: "Raúl López Sánchez"
 
 pawling1: "Alberto J. Pawling"
 pawling2: "Alberto J. Pawling"

 # the description for the bookmark at the nation select
 MEX_GATHERING_STORM_DESC: "Mexico stands at the closing days of the Maximato, the period when former president Plutarco Elias Calles held the true power in Mexico using right wing loyalists in both politics and the military. Since 1934, Lázaro Cárdenas del Río has waged a political war to end Plutarco's control over the country and enact his own left wing reforms. Mexico stands at a crossroads while the world prepares for war, as the left wing and right wing battle over control of the country's future and where it stands in the coming new world order."
 MEX_BLITZKRIEG_DESC: "The Maximato has ended and Calles is gone, but the battle between the left and right wings is still raging on. Emboldened by the economic hardship caused by the PEMEX embargoes, the right wing have become polarized and now exist in a state of political civil war over who will become the right wing candidate for the presidency next year. The dominant PRI however now rests at a choice between compromising their ideals with the moderate candidate Camacho or double down on the left wing candidate Mugica."

 # Biographies
 POLITICS_DIONISIO_ENCINA_DESC: "Dionisio was described as a polarizing figure, and historians were often found to have very little positive things to say about his leadership. Dionisio was responsible for the fracturing of the largest Mexican communist party, the PCM. He was backed by Soviet agents in charge of spreading communism in Mexico and never acted unless ordered to, and feared that his Soviet handlers would find a more suitable leader for the PCM. This fear caused him to purge anyone who had better leadership skills or charisma from the PCM out of fear that he would be replaced by them, leaving the PCM with a severe lack of good leadership and proactive thinking."

