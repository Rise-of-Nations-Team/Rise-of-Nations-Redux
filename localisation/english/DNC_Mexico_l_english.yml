# News Events

 DNC_Mexico_News.1.t: "Orizaba Athletic Club retires"
 DNC_Mexico_News.1.desc: "After several years of enthusiasm and sporting competition, the Orizaba Athletic Club has likely played its final match.\nThe team, composed largely of British workers from the Santa Gertrudis Hard Fibres Factory, suffered a three–nil defeat against the Mexico Cricket Club on the grounds near the railway station of Orizaba.\nFounded by Scottish technicians at the close of the last century, the club was among the pioneers of the new sport of football in Mexico and achieved lasting fame by becoming the first champion of the national championship in 1903."
 DNC_Mexico_News.1.a: "A legacy has been made"

