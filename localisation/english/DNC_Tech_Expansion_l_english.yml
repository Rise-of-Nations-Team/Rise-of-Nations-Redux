 RON_Gas_Turbines_desc: "Gas Turbines made exclusively for research."
 RON_Printing_Press_desc: "In a country it's essential to keep confidential documents actually confidential so by improving, and streamlining existing printing press schematics while also creating new procedures of handling those documents, it's going to allow us to keep them more safe."
 hoi4tgw_encryption_desc: "More procedures on what do to prevent the enemy from stealing vital information and if can't be prevented, how to stop them from getting away with it."
 RON_Television_Broadcasting_desc: "First TV prototypes, maybe later we can use them to store information in electricity?"
 RON_Early_Radio_desc: ""
 RON_Early_Circuit_Boards_desc: "Creating a first circuit board will grant us a major breakthrough in Computer Science."
 RON_Information_Study_desc: "To get more intel about our enemies we actually need to train our intelligence networks in how to look for classified documents, and how to use them effectively."
 hoi4tgw_decryption_desc: "More training on finding classified documents, and expanding our intelligence departments, maybe in the future we can make a machine which does this for us?"
 RON_Headset_desc: "Improved headset connected to special radios which we can use to capture any not encrypted enemy chatter, it's going to be an important thing in information warfare."
