 ww1_radio_desc: "AM Radio - possibly the most important invention in the 20th century. Finishing this early prototype is going to serve as a base for even more sophisticated warfare, civilian communications and more."
 ww1_electronic_mechanical_engineering_desc: "Merging Mechanical and Electronic engineering departments together will ensure that our scientists can work on future innovations more closely with eachother and give us faster results."
 subhulltech1_desc: "By mounting first radios inside submarine hulls we can ensure they're more organized and can perform better in the field."
