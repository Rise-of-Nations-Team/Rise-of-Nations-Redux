 USA_american_monarchy: "The American Monarchy"
 USA_american_monarchy_desc: "A monarchy is a form of government in which a person, the monarch, is head of state for life or until abdication. The political legitimacy and authority of the monarch may vary from restricted and largely symbolic (constitutional monarchy), to fully autocratic (absolute monarchy), and can expand across the domains of the executive, legislative, and judicial."

 USA_military_government: "The Military Government"
 USA_military_government_desc: "A military government is generally any government that is administered by military forces, whether or not this government is legal under the laws of the jurisdiction at issue, and whether this government is formed by natives or by an occupying power. It is usually carried out by military workers."

 USA_the_great_red_menace: "The Great Red Menace"
 USA_the_great_red_menace_desc: "Our actions in the previous war are still in recent memory with many. We must refocus the fears of the european continent on the true danger: the Great Red Menace that looms in the East. We will begin a massive propaganda campaign to open the eyes of the continent."
 
 SOV_the_great_prussian_menace: "The Great Prussian Menace"
 SOV_the_great_prussian_menace_desc: "The actions of the previous regime are still in recent memory with many. We must refocus the fears of the european continent on the true danger: the Great Prussian Menace that looms in Central Europe. We will begin a massive propaganda campaign to open the eyes of the continent."

 foreign_American_Imperialism: "American Imperialism"
 foreign_American_Imperialism_desc: "After nearly 100 years of isolationism from foreign affairs, the United States has finally emerged as a global power-broker on the world stage. The defeat of the weak Spanish Empire to seize Cuba and the Philippines only further supports our God-given obligation to dominate this hemisphere. It is truly the fulfillment of our Manifest Destiny."

 USA_Christianity_Official_Religion: "Christianity State Religion"
 USA_Christianity_Official_Religion_desc: "A state religion (also called an established religion or official religion) is a religion or creed officially endorsed by a sovereign state. A state with an official religion (also known as confessional state), while not secular, is not necessarily a theocracy. State religions are official or government-sanctioned establishments of a religion, but the state does not need to be under the control of the religion (as in a theocracy) nor is the state-sanctioned religion necessarily under the control of the state."

 USA_Legacy_of_the_British: "British Imperial Legacy"
 USA_Legacy_of_the_British_desc: "The Empire brought blood and suffering to millions, but it also brought railways, roads and education. For good or ill, much of the world is the way it is today because of the Empire, from the way it looks, to the sports people play, from the religion we practise, to the language we speak."

 USA_pax_americana: "Pax Americana"
 USA_pax_americana_desc: "Pax Americana is a term applied to the concept of relative peace in the Western Hemisphere and later in the world after the end of World War II in 1945, when the United States became the world's dominant economic and military power."

 GEN_Bastion_of_Democracy: "Bastion of Democracy"
 GEN_Bastion_of_Democracy_desc: "Democracy  is a form of government in which the people have the authority to deliberate and decide legislation ('direct democracy'), or to choose governing officials to do so ('representative democracy'). Who is considered part of 'the people' and how authority is shared among or delegated by the people has changed over time and at different rates in different countries, but over time more and more of a democratic country's inhabitants have generally been included. Cornerstones of democracy include freedom of assembly, association, property rights, freedom of religion and speech, inclusiveness and equality, citizenship, consent of the governed, voting rights, freedom from unwarranted governmental deprivation of the right to life and liberty, and minority rights."

