 KOR_gwangmu_reform: "Gwanmu Reform"
 KOR_gwangmu_reform_desc: "Despite limited knowledge of this outside of Korea itself, the Korean imperial family has pursued independent reforms akin to that of the Meiji restoration to further strengthen the state. Government funded schools, banks and railroads have all been greenlit under the constitution, heavily influenced by Emperor Gojong’s visit to Russia in 1897 including all the rituals and circumstances held with it. The reforms, however optimistic they are, have been under threat lately due to Koreans' questionable independence and opposition from the likes of the Japanese and conservatives in the government. Not only that, but the budget is extremely inflated with the expansion of the military. Time will tell if Korea can continue its reforms, hoping to seat itself as a modern and functioning bureaucracy."
 KOR_gwangmu_reform_better: "Gwanmu Reform"
 KOR_gwangmu_reform_better_desc: "Despite limited knowledge of this outside of Korea itself, the Korean imperial family has pursued independent reforms akin to that of the Meiji restoration to further strengthen the state. Government funded schools, banks and railroads have all been greenlit under the constitution, heavily influenced by Emperor Gojong’s visit to Russia in 1897 including all the rituals and circumstances held with it. The reforms, however optimistic they are, have been under threat lately due to Koreans' questionable independence and opposition from the likes of the Japanese and conservatives in the government. Not only that, but the budget is extremely inflated with the expansion of the military. Time will tell if Korea can continue its reforms, hoping to seat itself as a modern and functioning bureaucracy."

 USA_1900_usa_election: "1900 US Election"
 USA_1900_usa_election_desc: ""
 USA_jim_crow_laws00: "Jim Crow Laws"
 USA_jim_crow_laws00_desc: "After the Compromise of 1877 ended Reconstruction in the former Confederate States, southern lawmakers and local officials began to find increasingly creative ways to strip away the rights of former slaves and free African Americans who had been granted protections under the 13th, 14th, and 15th amendments passed by Congress after the war. These laws are colloquially referred to as “Jim Crow laws” and became the basis for the institution of segregation in the United States. The recent Plessy v. Ferguson decision only further enforced such laws as constitutional, and provided for the doctrine of “Separate but Equal”. The decision by the Supreme Court virtually extinguished any hope of striking the Jim Crow laws in the near future, and it is unlikely that the status quo of segregation will be challenged without more radical change."
