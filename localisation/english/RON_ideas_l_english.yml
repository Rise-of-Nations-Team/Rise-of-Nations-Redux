 GER_german_colonies: "German Colonies"
 GER_german_colonies_desc: "The Deutsches Kolonialreich constitued the overseas colonies, dependencies and territories of Imperial Germany. The established merchants and plantation operators in the African colonies frequently managed to sway government policies. Capital investments by banks were secured with public funds of the imperial treasury to minimize risk. While the French and the English instituted policies that spread their languages and culture, Germany restricted use of German to a small number of elite colonial subjects. Colonies were regarded as overspill for German settlers, rather than as territories to be developed and eventually granted autonomy, or independence."
