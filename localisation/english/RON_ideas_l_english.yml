 SPR_the_regency_of_maria_christina_idea: "The Regency of Maria Christina"
 SPR_the_regency_of_maria_christina_idea_desc: "From the death of her husband, Maria Christina has been the regent for Spain until the king becomes of age. Her reign as her son's regent has seen a peaceful return to relative stability, passing through reforms whenever needed. Although the Spanish-American war tarnished her image greatly, she still has still managed to hold a fragile Spain together.. §RFor now...§"
 SPR_rigged_elections_idea: "El Turno Pacífico"
 SPR_rigged_elections_idea_desc: "With the failure of the First Spanish Republic, the creation of the Spanish Constitution of 1876 allowed the king to continue his reign as a constitutional monarchy, but still holding enough power to help in a system named 'Turno Pacifico', or 'Peaceful Turn'. A system in which the king would appoint and topple governments, allowing the opposition party to take power. Under this system the Conseratives and Liberals have altered in power by the means of Election rigging, by using their links to the local governments and Ministry of the Interior to ensure power and prevent smaller parties from taking on any form of power."
 SPR_an_empire_in_decline_idea: "Fallen Empire"
 SPR_an_empire_in_decline_idea_desc: "Ever since the 17th century, the Spanish Empire has been an Empire in decline. A line of weak kings and a focus on the colonies more than Spain's own economic gain led to Spain's Empire and Economy entering a slow decline. Napolean, the Carlist wars and the chaos of the First Republic has only hastened the fall of this once great empire"
