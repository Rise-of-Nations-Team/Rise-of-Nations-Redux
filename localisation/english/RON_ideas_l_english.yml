 SPR_memories_of_the_spanish_american_war_idea: "El desastre del 98"
 SPR_memories_of_the_spanish_american_war_idea_desc: "The Spanish-American war of 1898, or 'El desastre del 98', was the most humilating war Spain has seen, putting the weakness of the Spanish navy and army on full display, as well as helping catapult America's status as a great power even further."
