 USA_the_two_party_system01: "The Two-Party System"
 USA_the_two_party_system_desc: "Though the United States has been through some rough patches in its history, the country has remained—for the most part—an immensely stable democratic system, in no small part because of the two-party system. Unlike parliamentary democracy, the party system gives the unique advantage of an exxtra defense against the more extreme political viewpoints and allows policy to stay fairly consistent over time. Due to this entrenched establishment, it is very difficult for smaller and more extreme parties to gain prominence in the United States—that is without attaching their ideas to one of the ‘Big Two’..."
