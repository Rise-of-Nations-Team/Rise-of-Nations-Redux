 JAP_for_the_emperor: "For the Emperor"
 JAP_for_the_emperor_desc: ""
 JAP_overstreched_economy: "Overstreched Economy"
 JAP_overstreched_economy_desc: ""
 JAP_meiji_restoration: "Meiji Restoration"
 JAP_meiji_restoration_desc: "Long live the great emperor Matsuhito. Restorer of the Japanese imperial power. Japan is now set on a course of a nationalistic and powerful central government, headed by a lineage of men descended from the sun god himself. Some mock or critise us for the absolute powers he holds, but is it not the roots of the Western powers that seeded the idea of absolute monarchy? And was it not those systems that brought them to greatness? Japan shall now take its turn on the world stage, and no one shall stop it."
 JAP_bushido_code: "Bushido Code"
 JAP_bushido_code_desc: "The Japanese warrior code, or Bushido is the widespread idea in our army of the samurai primacy, the way of the warrior. the importance of attack, honor, and death before surrender. Japan has long been honing its sense of honor since time immemorium. On the modern stage, it gives her soldiers a sense of fanaticism, the ability to throw themselves into the fray without any sense of hesitation."
 JAP_developed_rail_network: "Developed Rail Network"
 JAP_developed_rail_network_desc: "Sakoku, or "closed country" has ended, ever since 1854. Westerm investors took a keen eye on the landscape of Japan, selling and constructing vast railway networks across the home islands, with many of our engineers keenly observing and utilising these machines. Japan since, has rapidly industrialised the likes of which no other eastern country has seen before."
 JAP_wooden_constructions: "Wooden Constructions"
 JAP_wooden_constructions_desc: "Spare for a handful of buildings in the largest cities, the majority of constructions in Japan are traditional, wooden and paper buildings providing only protection from the elements. Our engineerial thought still reflects this, with tradition taking precedense over modernisation. We are yet to take advantage of brick or concrete, and our construction ability reflects this."
 JAP_kokai_naval_spirit: "Kokai Naval Spirit"
 JAP_kokai_naval_spirit_desc: "Kokai is known as "high seas". Japan has always had its eye on the seas beyond. The sun rises from the great ocean in the east, and sets in the sea of Japan to the west. Instead of sheer firepower and force, Japan can rely on a supreme spirit and will of her sailors, and the conviction of the commanders that guide them."
 JAP_interservice_rivalry_cooperative: "Interservice Rivalry - Cooperative"
 JAP_interservice_rivalry_cooperative_desc: "Despite previous disputes between the military branches of Japan, the Army and Navy are now unexpectedly cooperating, and Japan is seeing a stark increase in the flexibility of our command, even outperforming the cooperation of ther nations."
 JAP_interservice_rivalry_none: "Interservice Rivalry - None"
 JAP_interservice_rivalry_none_desc: "There is currently no noticable dispute or rivalry between the Army or Navy."
 JAP_interservice_rivalry_low: "Interservice Rivalry - Low"
 JAP_interservice_rivalry_low_desc: "Some small, insignificant disagreements are present between the Army and Navy's direction."
 JAP_interservice_rivalry_medium: "Interservice Rivalry - Medium"
 JAP_interservice_rivalry_medium_desc: "There are noticable disagreements between the direction of our Army and Navy. This must be quelled soon as the performance of the Japanese forces are to suffer."
 JAP_interservice_rivalry_high: "Interservice Rivalry - High"
 JAP_interservice_rivalry_high_desc: "There are active and sustained rivalries between the Army and Navy of Japan. This has lead to a severe degredation of Army and Navy performance, as well as a hit to our Military Staff."
 JAP_interservice_rivalry_extreme: "Interservice Rivalry - Extreme"
 JAP_interservice_rivalry_extreme_desc: "The Interservice Rivalry between the Army and Navy has gotten severely out of hand, and our whole military operation has practically grinded to a halt. Some would even call it a civil conflict, without a resolution, Japan is tearing itself apart."

# IDEAS
 KOR_great_game_defense_1: "Great Game"
 KOR_great_game_defense_1_desc: "Korea is in a valley between great powers, all brutally vying for control over her homeland. Russia, Japan, China, and the West all pry at her like vultures at a carcass. The dangerous overlapping claims on the empire will surely be her undoing, if not dealt with swiftly. With the establishment of the Chukhwabi, Korea has staved off the western powers. This does not mean she is safe, however. Japan and Russia are currently butting heads over the peninsula, paying no credence to China’s claim, although her ability to stake it is questionable. The treaty of Ganghwa island has allowed Japan to “modernize” Korea, but so far it seems to be a ploy to exert influence. The “A Gwan Pa Cheon” incident with Russia has also increased tensions with the giant to our north. Without action, Korea is a staging ground for a great struggle, all to swallow the tiger whole, with not even an objection out of her. The great powers would have us shut up and sit down to bow to their whims, but if we maneuver ourselves cunningly, and stand up to those who would have us eaten, we may survive yet."

 KOR_great_game_offense_1: "Great Game"
 KOR_great_game_offense_1_desc: "Korea is in a valley between great powers, all brutally vying for control over her homeland. Russia, Japan, China, and the West all pry at her like vultures at a carcass. The dangerous overlapping claims on the empire will surely be her undoing, if not dealt with swiftly. With the establishment of the Chukhwabi, Korea has staved off the western powers. This does not mean she is safe, however. Japan and Russia are currently butting heads over the peninsula, paying no credence to China’s claim, although her ability to stake it is questionable. The treaty of Ganghwa island has allowed Japan to “modernize” Korea, but so far it seems to be a ploy to exert influence. The “A Gwan Pa Cheon” incident with Russia has also increased tensions with the giant to our north. Without action, Korea is a staging ground for a great struggle, all to swallow the tiger whole, with not even an objection out of her. The great powers would have us shut up and sit down to bow to their whims, but if we maneuver ourselves cunningly, and stand up to those who would have us eaten, we may survive yet."


