 USA_fully_industrialized_society: "Fully-Industrialized Society"
 USA_fully_industrialized_society_desc: "Although it may not have been the first nation to undergo an industrial revolution, there is perhaps nowhere in the world where industrialism has reached as great of an extent as it has in the United States. The nation is the global center of manufacturing, production, and innovation, with an economy rivaling that of the greatest European Powers."
